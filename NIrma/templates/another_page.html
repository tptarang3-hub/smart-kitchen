<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Food</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='App.css') }}">
</head>
<body>
    <div class="App">
        <header class="App-header">
            <h1>Manage Food</h1>
            <p>Manage your food inventory here.</p>
        </header>
    </div>

    <div class="inventory-container">
        <h2>Add New Item</h2>
        <form id="add-item-form">
            <label for="item-name">Item Name:</label>
            <input type="text" id="item-name" name="item_name" required>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" required>
            <label for="expiry-date">Expiry Date:</label>
            <input type="date" id="expiry-date" name="expiry_date" required><br>
            <label for="category">Category:</label>
            <input type="text" id="category" name="category" required>
            <button type="submit">Add Item</button>
        </form>
    </div>

    <div class="inventory-container">
        <h2>Update Existing Item</h2>
        <form id="update-item-form">
            <label for="update-item-id">Item ID:</label>
            <input type="number" id="update-item-id" name="item_id" required>
            <label for="update-item-name">Item Name:</label>
            <input type="text" id="update-item-name" name="item_name" required>
            <label for="update-quantity">Quantity:</label>
            <input type="number" id="update-quantity" name="quantity" required><br>
            <label for="update-expiry-date">Expiry Date:</label>
            <input type="date" id="update-expiry-date" name="expiry_date" required>
            <label for="update-category">Category:</label>
            <input type="text" id="update-category" name="category" required>
            <button type="submit">Update Item</button>
        </form>
    </div>

    <a href="/index1.html" class="redirect-link">Go to AI Menu Generator</a>
    <a href="/waste_monitoring.html" class="redirect-link">Go to Waste Monitoring</a>

    <script>
        document.getElementById('add-item-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            fetch('/add_item', {
                method: 'POST',
                body: new URLSearchParams(formData)
            })
            .then(response => response.json())
            .then(data => alert(data.message))
            .catch(error => console.error('Error:', error));
        });

        document.getElementById('update-item-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            fetch('/update_item', {
                method: 'POST',
                body: new URLSearchParams(formData)
            })
            .then(response => response.json())
            .then(data => alert(data.message))
            .catch(error => console.error('Error:', error));
        });
    </script>
</body>
</html>
